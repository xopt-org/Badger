apiVersion: apps/v1
kind: Deployment
metadata:
  name: badger-gateway
  namespace: badger-gui
  labels:
    app: badger-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: badger-gateway
  template:
    metadata:
      labels:
        app: badger-gateway
    spec:
      containers:
        - name: gateway
          image: pluflou/badger-gateway:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /badger/
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: badger-gateway
  namespace: badger-gui
  labels:
    app: badger-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: badger-gateway
