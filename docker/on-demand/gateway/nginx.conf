worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;

        # Lobby page
        location = /badger/ {
            root /usr/share/nginx/html;
            try_files /lobby.html =404;
        }
        location = /badger {
            return 301 /badger/;
        }

        # Status endpoint proxy (must come before the general session regex)
        location ~ ^/badger/session/(\d+)/status {
            resolver kube-dns.kube-system.svc.cluster.local valid=5s;
            set $session_id $1;
            set $pod_host badger-gui-$session_id.badger-gui-headless.badger-gui.svc.cluster.local;

            proxy_pass http://$pod_host:8080/status;
            proxy_read_timeout 5s;
        }

        # Per-session reverse proxy (dynamic pod routing)
        location ~ ^/badger/session/(\d+)/(.*) {
            resolver kube-dns.kube-system.svc.cluster.local valid=5s;
            set $session_id $1;
            set $path_remainder $2;
            set $pod_host badger-gui-$session_id.badger-gui-headless.badger-gui.svc.cluster.local;

            proxy_pass http://$pod_host:6080/$path_remainder$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
